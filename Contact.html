<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Chips Waya Waya</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family: Arial, Helvetica, sans-serif;
            background-color:#f5deb3;
        }

        /* HEADER */

        header{
            background-color:#14532d;
            padding:20px;
            text-align:center;
        }

        .logo img{
            width:90px;
            height:80px;
            border-radius:12px;
            border:3px solid white;
            margin-bottom:15px;
        }

        nav{
            display:flex;
            justify-content:center;
            gap:25px;
            flex-wrap:wrap;
        }

        nav a{
            color:white;
            text-decoration:none;
            font-size:18px;
            font-weight:bold;
            transition:0.3s;
        }

        nav a:hover{
            color:gold;
        }

        /* MAIN */

        main{
            padding:40px 20px;
            text-align:center;
        }

        h1{
            color:darkred;
            font-size:45px;
            margin-bottom:15px;
        }

        h2{
            color:darkgreen;
            font-size:30px;
            margin-bottom:30px;
        }

        /* CONTACT BOX */

        .contact-box{
            background-color:white;
            width:80%;
            max-width:700px;
            margin:auto;
            padding:30px;
            border-radius:20px;
            box-shadow:0 4px 10px rgba(0,0,0,0.2);
        }

        .contact-box p{
            font-size:22px;
            margin:20px 0;
            color:#333;
            font-weight:bold;
        }

        .contact-image{
            width:250px;
            height:250px;
            object-fit:cover;
            border-radius:15px;
            margin-top:20px;
            border:4px solid #14532d;
        }

        /* MAP */

        .map-container{
            margin-top:40px;
        }

        iframe{
            width:100%;
            max-width:700px;
            height:400px;
            border-radius:15px;
            box-shadow:0 4px 10px rgba(0,0,0,0.2);
        }

        /* FOOTER */

        footer{
            background-color:#14532d;
            color:white;
            text-align:center;
            padding:20px;
            margin-top:50px;
        }

        /* RESPONSIVE */

        @media(max-width:768px){

            nav{
                flex-direction:column;
                gap:15px;
            }

            h1{
                font-size:35px;
            }

            .contact-box{
                width:95%;
            }

            iframe{
                height:300px;
            }
        }

    </style>

</head>

<body>

    <!-- HEADER -->

    <header>

        <div class="logo">
            <img src="Images/7B88238C-96D8-4F66-98F6-1BE80C038338.jpeg" alt="Logo">
        </div>

        <nav>
            <a href="home.html">Home</a>
            <a href="About Us.html">About Us</a>
            <a href="Gallery.html">Gallery</a>
            <a href="Products.html">Products</a>
            <a href="Contact.html">Contact</a>
        </nav>

    </header>

    <!-- MAIN -->

    <main>

        <h1><u>Contact Us</u></h1>

        <h2>CHIPS WAYA WAYA</h2>

        <div class="contact-box">

            <p>📞 Sandile: 074 799 9986</p>

            <p>📞 Mamzo: 083 200 1577</p>

            <img src="Images/6FECE7CA-B0C9-4BFB-A16D-5F05DC1CA4B6.jpeg"
                 class="contact-image"
                 alt="Chips Waya Waya">

        </div>

        <!-- MAP -->

        <div class="map-container">

            <iframe 
                src="https://www.google.com/maps/embed?pb=!1m23!1m12!1m3!1d28641.282604923683!2d28.033024!3d-26.1914624!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!4m8!3e6!4m0!4m5!1s0x1e950b9300000001%3A0x335d35f228da3ccd!2sRosebank%20College%20%7C%20Braamfontein%20Campus%2C%20Braamfontein%20Centre%2C%2023%20Jorissen%20St%2C%20Braamfontein%2C%20Johannesburg%2C%202017!3m2!1d-26.192535499999998!2d28.0338644!5e0!3m2!1sen!2sza!4v1776428434708!5m2!1sen!2sza"
                allowfullscreen=""
                loading="lazy">
            </iframe>

        </div>

    </main>

    <!-- FOOTER -->

    <footer>
        &copy; ST10517088 | Chips Waya Waya
    </footer>

</body>

</html>
