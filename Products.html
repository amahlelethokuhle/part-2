<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product | Chips Waya Waya</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family: Arial, Helvetica, sans-serif;
            background-color:#f5deb3;
        }

        /* HEADER */

        header{
            background-color:#14532d;
            padding:20px;
            text-align:center;
        }

        .logo img{
            width:90px;
            height:80px;
            border-radius:12px;
            border:3px solid white;
            margin-bottom:15px;
        }

        nav{
            display:flex;
            justify-content:center;
            gap:25px;
            flex-wrap:wrap;
        }

        nav a{
            color:white;
            text-decoration:none;
            font-size:18px;
            font-weight:bold;
            transition:0.3s;
        }

        nav a:hover{
            color:gold;
        }

        /* MAIN CONTENT */

        main{
            padding:40px 20px;
            text-align:center;
        }

        h1{
            color:darkred;
            font-size:45px;
            margin-bottom:15px;
        }

        h2{
            color:darkgreen;
            margin-bottom:30px;
            font-size:30px;
        }

        /* PRICE CARDS */

        .price-container{
            display:flex;
            justify-content:center;
            gap:25px;
            flex-wrap:wrap;
            margin-bottom:40px;
        }

        .price-card{
            background-color:white;
            width:250px;
            padding:20px;
            border-radius:15px;
            box-shadow:0 4px 10px rgba(0,0,0,0.2);
            transition:0.3s;
        }

        .price-card:hover{
            transform:translateY(-10px);
        }

        .price-card h3{
            color:darkred;
            margin-bottom:10px;
        }

        .price-card p{
            font-size:22px;
            font-weight:bold;
            color:darkgreen;
        }

        /* GALLERY */

        .gallery{
            display:flex;
            justify-content:center;
            gap:20px;
            flex-wrap:wrap;
        }

        .gallery img{
            width:300px;
            height:300px;
            object-fit:cover;
            border-radius:15px;
            border:4px solid white;
            box-shadow:0 4px 10px rgba(0,0,0,0.3);
            transition:0.3s;
        }

        .gallery img:hover{
            transform:scale(1.05);
        }

        /* FOOTER */

        footer{
            background-color:#14532d;
            color:white;
            text-align:center;
            padding:20px;
            margin-top:40px;
        }

        /* RESPONSIVE */

        @media(max-width:768px){

            nav{
                flex-direction:column;
                gap:15px;
            }

            h1{
                font-size:35px;
            }

            .gallery img{
                width:90%;
                height:auto;
            }
        }

    </style>

</head>

<body>

    <!-- HEADER -->

    <header>

        <div class="logo">
            
        </div>

        <nav>
            <a href="home.html">Home</a>
            <a href="About Us.html">About Us</a>
            <a href="Gallery.html">Gallery</a>
            <a href="Products.html">Products</a>
            <a href="Contact.html">Contact</a>
        </nav>

    </header>

    <!-- MAIN -->

    <main>

        <h1><u>Prices</u></h1>

        <h2>Chips Waya Waya Menu</h2>

        <div class="price-container">

            <div class="price-card">
                <h3>Kota</h3>
                <p>R25</p>
            </div>

            <div class="price-card">
                <h3>Chips With Chillies</h3>
                <p>R35</p>
            </div>

            <div class="price-card">
                <h3>Normal Chips Small</h3>
                <p>R20</p>
            </div>

            <div class="price-card">
                <h3>Large Chips</h3>
                <p>R40</p>
            </div>

        </div>

        <!-- FOOD IMAGES -->

        <div class="gallery">

            <img src="Images/AD52CC9F-7AFE-4907-81BC-53FF4635B92A.jpeg" alt="Food Image 1">

            <img src="Images/FDBB83A6-46DE-454A-A6DA-6CD443AF4EBD.jpeg" alt="Food Image 2">

            <img src="Images/7B88238C-96D8-4F66-98F6-1BE80C038338.jpeg" alt="Food Image 3">

        </div>

    </main>

    <!-- FOOTER -->

    <footer>
        &copy; ST10517088 | Chips Waya Waya
    </footer>

</body>

</html>
